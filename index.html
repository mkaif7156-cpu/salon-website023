<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio 7 Unisex Salon</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body{
  background:#0f0f0f;
  color:#fff;
}

/* NAVBAR */
nav{
  position:fixed;
  width:100%;
  top:0;
  padding:15px 0;
  text-align:center;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:1000;
}

nav a{
  color:#fff;
  margin:0 20px;
  text-decoration:none;
  font-size:18px;
  transition:.3s;
}

nav a:hover{
  color:#e6c27a;
}

/* HERO */
header{
  height:100vh;
  background:
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.85)),
    url('bg.jpg');
  background-size:cover;
  background-position:center;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero-content{
  backdrop-filter:blur(8px);
  background:rgba(0,0,0,0.4);
  padding:40px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(230,194,122,0.2);
}

header h1{
  font-size:60px;
  letter-spacing:3px;
  text-transform:uppercase;
}

header p{
  margin-top:15px;
  font-size:20px;
  color:#ddd;
}

/* BUTTONS */
.btn-group{
  margin-top:25px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.btn{
  padding:14px 25px;
  border-radius:30px;
  background:linear-gradient(45deg,#c59d5f,#e6c27a);
  color:#000;
  text-decoration:none;
  font-weight:bold;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 15px 30px rgba(197,157,95,0.7);
}

/* SECTIONS */
section{
  padding:80px 10%;
}

.section-title{
  text-align:center;
  font-size:38px;
  margin-bottom:40px;
  color:#e6c27a;
}

/* SERVICES */
.services{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:15px;
  text-align:center;
  backdrop-filter:blur(10px);
  transition:.3s;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 25px rgba(230,194,122,0.3);
}

.price{
  color:#e6c27a;
  margin-top:10px;
  font-weight:bold;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#000;
  color:#aaa;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="#">Home</a>
  <a href="#services">Services</a>
  <a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<header>
  <div class="hero-content">
    <h1>Studio 7</h1>
    <p>Luxury Grooming Experience</p>

    <div class="btn-group">
      <a href="https://api.whatsapp.com/send?phone=919528752039" class="btn">Book on WhatsApp</a>
      <a href="tel:+919528752039" class="btn">Call Now</a>
    </div>
  </div>
</header>

<!-- SERVICES -->
<section id="services">
  <h2 class="section-title">Our Services</h2>

  <div class="services">
    <div class="card">
      <h3>Haircut</h3>
      <p>Professional modern styling</p>
      <div class="price">₹150</div>
    </div>

    <div class="card">
      <h3>Beard Styling</h3>
      <p>Perfect beard shaping</p>
      <div class="price">₹100</div>
    </div>

    <div class="card">
      <h3>Hair Spa</h3>
      <p>Relax & nourish treatment</p>
      <div class="price">₹499</div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  © 2026 Studio 7 Unisex Salon
</footer>

</body>
</html>
